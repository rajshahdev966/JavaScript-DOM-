<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>

        <div class="user-form">
            <form action="">
                <input type="text" placeholder="Enter your name"><br>
                <input type="text" placeholder="Enter your mail">
                <div>
                    <input type="url" placeholder="Image URL">
                    <button>Add User</button>
                </div>
            </form>
        </div>

        <div class="user-collection">
            <div class="user-card">
                <div class="user-card-img">
                    <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
                </div>
                <span>Raj Shah</span>
                <p>Email: rajshah@mail.com</p>
                <div class="user-card-buttons">
                    <button class="edit" onclick="">Edit</button>
                    <button class="del" onclick="">Delete</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
